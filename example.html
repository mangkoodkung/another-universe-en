<div class="another-universe-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🌌 Another Universe</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div>
                <input id="another_universe_enabled" type="checkbox" />
                <label for="another_universe_enabled">Enable Another Universe</label>
            </div>
            <hr />
            <div class="au-theme-selector">
                <label for="another_universe_theme"><small>🎭 Universe Theme:</small></label>
                <select id="another_universe_theme" class="text_pole">
                    <option value="random">🎲 Random</option>
                    <option value="medieval">🏰 Medieval Fantasy</option>
                    <option value="scifi">🚀 Sci-Fi / Space</option>
                    <option value="cyberpunk">🌆 Cyberpunk</option>
                    <option value="modern">☕ Modern Slice of Life</option>
                    <option value="postapoc">🏚️ Post-Apocalyptic</option>
                    <option value="historical">🎭 Historical Drama</option>
                    <option value="horror">🌑 Dark / Horror</option>
                    <option value="dream">💫 Dreamscape / Surreal</option>
                </select>
            </div>
            <div class="au-theme-selector">
                <label for="another_universe_encounter"><small>💫 Encounter Type:</small></label>
                <select id="another_universe_encounter" class="text_pole">
                    <option value="random">🎲 Random</option>
                    <option value="firstMeet">💫 First Meeting</option>
                    <option value="reunion">🔄 Reunion</option>
                    <option value="rivals">⚔️ Rivals / Enemies</option>
                    <option value="allies">🤝 Partners / Allies</option>
                    <option value="bittersweet">💔 Bittersweet</option>
                    <option value="mistaken">🎭 Mistaken Identity</option>
                    <option value="fated">🌙 Fated Encounter</option>
                </select>
            </div>
            <div class="au-theme-selector">
                <label for="another_universe_mood"><small>🎨 Mood / Tone:</small></label>
                <select id="another_universe_mood" class="text_pole">
                    <option value="random">🎲 Random</option>
                    <option value="romantic">💕 Romantic</option>
                    <option value="comedic">😂 Comedic</option>
                    <option value="dark">🖤 Dark / Intense</option>
                    <option value="melancholic">🌧️ Melancholic</option>
                    <option value="mysterious">🔮 Mysterious</option>
                    <option value="wholesome">🌻 Wholesome</option>
                </select>
            </div>
            <hr />
            <div>
                <input id="another_universe_open_btn" class="menu_button" type="submit" value="✨ Open Another Universe" />
                <input id="another_universe_gallery_btn" class="menu_button" type="submit" value="📚 Gallery" />
            </div>
            <p><small>เลือกธีม + ประเภทการพบเจอ + อารมณ์ แล้วกดเปิดจักรวาลคู่ขนาน</small></p>
        </div>
    </div>
</div>
